name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  # Full quality suite on the primary PHP version using the lock file
  quality:
    name: Quality PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.4', '8.5' ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
          tools: composer:v2
          extensions: pcntl

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check Code Style (PHPCS)
        run: composer cs-check

      - name: Mess Detector (PHPMD)
        run: composer mess

      - name: Static Analysis (PHPStan)
        run: composer stan

      - name: Run Tests
        timeout-minutes: 5
        run: vendor/bin/phpunit --coverage-text --colors=never

      - name: Run Infection
        timeout-minutes: 5
        run: vendor/bin/infection --threads=max --min-msi=100 --min-covered-msi=100 --only-covered

  # Compatibility check: composer resolves versions per PHP, tests only
  compatibility:
    name: PHP ${{ matrix.php }} Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Install dependencies (no lock file)
        run: composer update --prefer-dist --no-progress --prefer-stable

      - name: Run Tests
        timeout-minutes: 5
        run: vendor/bin/phpunit
