name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    name: PHP ${{ matrix.php }} Test & Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false # Run all matrix jobs even if one fails
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov       # PCOV
          tools: composer:v2
          extensions: pcntl

      # --- Caching ---
      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      # --- Install ---
      - name: Validate composer.json
        run: composer validate --strict
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # --- Linters ---
      - name: Check Code Style (PHPCS)
        run: composer cs-check  # Запускает phpcs (не phpcbf!)

      - name: Mess Detector (PHPMD)
        run: composer mess

      - name: Static Analysis (PHPStan)
        run: composer stan

      # --- Tests ---
      - name: Run Tests
        timeout-minutes: 5
        run: vendor/bin/phpunit --coverage-text --colors=never
      - name: Run Infection
        timeout-minutes: 5
        run: vendor/bin/infection --threads=max --min-msi=100 --min-covered-msi=100 --only-covered
